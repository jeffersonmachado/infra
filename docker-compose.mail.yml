services:
  postfix:
    build:
      context: ./mail/postfix
    container_name: results-mail-postfix
    restart: unless-stopped
    depends_on:
      mail-certs-bootstrap:
        condition: service_completed_successfully
      dovecot:
        condition: service_started
      rspamd:
        condition: service_started
      ldap:
        condition: service_started
    ports:
      - "${MAIL_BIND_IP:-0.0.0.0}:${SMTP_PORT:-25}:25"
      - "${MAIL_BIND_IP:-0.0.0.0}:${SUBMISSION_PORT:-587}:587"
      - "${MAIL_BIND_IP:-0.0.0.0}:${SMTPS_PORT:-465}:465"
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      MAIL_HOSTNAME: ${MAIL_HOSTNAME:-mx1.results.com.br}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-results.com.br}
      MAIL_UID: ${MAIL_UID:-1004}
      MAIL_GID: ${MAIL_GID:-1004}
      MAIL_RELAY_NETWORKS: ${MAIL_RELAY_NETWORKS:-127.0.0.0/8}
      MAIL_MESSAGE_SIZE_LIMIT: ${MAIL_MESSAGE_SIZE_LIMIT:-20480000}
      MAIL_MYSQL_HOST: ${MAIL_MYSQL_HOST:-10.10.2.99}
      MAIL_MYSQL_PORT: ${MAIL_MYSQL_PORT:-3306}
      MAIL_MYSQL_DATABASE: ${MAIL_MYSQL_DATABASE:-results}
      MAIL_MYSQL_USER: ${MAIL_MYSQL_USER:-resultsdba}
      MAIL_MYSQL_PASSWORD: ${MAIL_MYSQL_PASSWORD:-}
      MAIL_MAILBOX_TABLE: ${MAIL_MAILBOX_TABLE:-mailbox}
      MAIL_ALIAS_TABLE: ${MAIL_ALIAS_TABLE:-alias}
      MAIL_DOMAIN_TABLE: ${MAIL_DOMAIN_TABLE:-domain}
      MAIL_TLS_CERT_FILE: ${MAIL_TLS_CERT_FILE:-/certs/fullchain.pem}
      MAIL_TLS_KEY_FILE: ${MAIL_TLS_KEY_FILE:-/certs/privkey.pem}
      MAIL_ENABLE_LDAP: ${MAIL_ENABLE_LDAP:-true}
      LDAP_URI: ${LDAP_URI:-ldap://srvldap0.results.intranet,ldap://srvldap1.results.intranet,ldap://srvldap2.results.intranet,ldap://srvldap3.results.intranet}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=results,dc=com,dc=br}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-cn=administrador,dc=results,dc=com,dc=br}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_USERS_BASE_DN: ${LDAP_USERS_BASE_DN:-ou=people,dc=results,dc=com,dc=br}
      LDAP_GROUPS_BASE_DN: ${LDAP_GROUPS_BASE_DN:-ou=groups,dc=results,dc=com,dc=br}
      RSPAMD_MILTER_HOST: ${RSPAMD_MILTER_HOST:-rspamd}
      RSPAMD_MILTER_PORT: ${RSPAMD_MILTER_PORT:-11332}
      MAIL_ANVIL_RATE_TIME_UNIT: ${MAIL_ANVIL_RATE_TIME_UNIT:-60s}
      MAIL_CLIENT_CONNECTION_COUNT_LIMIT: ${MAIL_CLIENT_CONNECTION_COUNT_LIMIT:-30}
      MAIL_CLIENT_CONNECTION_RATE_LIMIT: ${MAIL_CLIENT_CONNECTION_RATE_LIMIT:-60}
      MAIL_CLIENT_MESSAGE_RATE_LIMIT: ${MAIL_CLIENT_MESSAGE_RATE_LIMIT:-100}
      MAIL_SMTPD_SOFT_ERROR_LIMIT: ${MAIL_SMTPD_SOFT_ERROR_LIMIT:-10}
      MAIL_SMTPD_HARD_ERROR_LIMIT: ${MAIL_SMTPD_HARD_ERROR_LIMIT:-20}
      MAIL_POSTSCREEN_DNSBL_ACTION: ${MAIL_POSTSCREEN_DNSBL_ACTION:-ignore}
      MAIL_POSTSCREEN_DNSBL_SITES: ${MAIL_POSTSCREEN_DNSBL_SITES:-zen.spamhaus.org*2 bl.spamcop.net*1 b.barracudacentral.org*1}
      MAIL_POSTSCREEN_DNSBL_THRESHOLD: ${MAIL_POSTSCREEN_DNSBL_THRESHOLD:-2}
    volumes:
      - maildata:/var/mail/vhosts
      - mail-certs:/certs:ro
      - mail-state:/var/spool/postfix
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  postfix-mx2:
    build:
      context: ./mail/postfix
    container_name: results-mail-postfix-mx2
    restart: unless-stopped
    depends_on:
      mail-certs-bootstrap:
        condition: service_completed_successfully
      dovecot:
        condition: service_started
      rspamd:
        condition: service_started
      ldap:
        condition: service_started
    ports:
      - "${MAIL_MX2_BIND_IP:-10.10.2.30}:${SMTP_PORT:-25}:25"
      - "${MAIL_MX2_BIND_IP:-10.10.2.30}:${SUBMISSION_PORT:-587}:587"
      - "${MAIL_MX2_BIND_IP:-10.10.2.30}:${SMTPS_PORT:-465}:465"
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      MAIL_HOSTNAME: ${MAIL_MX2_HOSTNAME:-mx2.results.com.br}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-results.com.br}
      MAIL_UID: ${MAIL_UID:-1004}
      MAIL_GID: ${MAIL_GID:-1004}
      MAIL_RELAY_NETWORKS: ${MAIL_RELAY_NETWORKS:-127.0.0.0/8}
      MAIL_MESSAGE_SIZE_LIMIT: ${MAIL_MESSAGE_SIZE_LIMIT:-20480000}
      MAIL_MYSQL_HOST: ${MAIL_MYSQL_HOST:-10.10.2.99}
      MAIL_MYSQL_PORT: ${MAIL_MYSQL_PORT:-3306}
      MAIL_MYSQL_DATABASE: ${MAIL_MYSQL_DATABASE:-results}
      MAIL_MYSQL_USER: ${MAIL_MYSQL_USER:-resultsdba}
      MAIL_MYSQL_PASSWORD: ${MAIL_MYSQL_PASSWORD:-}
      MAIL_MAILBOX_TABLE: ${MAIL_MAILBOX_TABLE:-mailbox}
      MAIL_ALIAS_TABLE: ${MAIL_ALIAS_TABLE:-alias}
      MAIL_DOMAIN_TABLE: ${MAIL_DOMAIN_TABLE:-domain}
      MAIL_TLS_CERT_FILE: ${MAIL_MX2_TLS_CERT_FILE:-${MAIL_TLS_CERT_FILE:-/certs/fullchain.pem}}
      MAIL_TLS_KEY_FILE: ${MAIL_MX2_TLS_KEY_FILE:-${MAIL_TLS_KEY_FILE:-/certs/privkey.pem}}
      MAIL_ENABLE_LDAP: ${MAIL_ENABLE_LDAP:-true}
      LDAP_URI: ${LDAP_URI:-ldap://srvldap0.results.intranet,ldap://srvldap1.results.intranet,ldap://srvldap2.results.intranet,ldap://srvldap3.results.intranet}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=results,dc=com,dc=br}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-cn=administrador,dc=results,dc=com,dc=br}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_USERS_BASE_DN: ${LDAP_USERS_BASE_DN:-ou=people,dc=results,dc=com,dc=br}
      LDAP_GROUPS_BASE_DN: ${LDAP_GROUPS_BASE_DN:-ou=groups,dc=results,dc=com,dc=br}
      RSPAMD_MILTER_HOST: ${RSPAMD_MILTER_HOST:-rspamd}
      RSPAMD_MILTER_PORT: ${RSPAMD_MILTER_PORT:-11332}
      MAIL_ANVIL_RATE_TIME_UNIT: ${MAIL_ANVIL_RATE_TIME_UNIT:-60s}
      MAIL_CLIENT_CONNECTION_COUNT_LIMIT: ${MAIL_CLIENT_CONNECTION_COUNT_LIMIT:-30}
      MAIL_CLIENT_CONNECTION_RATE_LIMIT: ${MAIL_CLIENT_CONNECTION_RATE_LIMIT:-60}
      MAIL_CLIENT_MESSAGE_RATE_LIMIT: ${MAIL_CLIENT_MESSAGE_RATE_LIMIT:-100}
      MAIL_SMTPD_SOFT_ERROR_LIMIT: ${MAIL_SMTPD_SOFT_ERROR_LIMIT:-10}
      MAIL_SMTPD_HARD_ERROR_LIMIT: ${MAIL_SMTPD_HARD_ERROR_LIMIT:-20}
      MAIL_POSTSCREEN_DNSBL_ACTION: ${MAIL_POSTSCREEN_DNSBL_ACTION:-ignore}
      MAIL_POSTSCREEN_DNSBL_SITES: ${MAIL_POSTSCREEN_DNSBL_SITES:-zen.spamhaus.org*2 bl.spamcop.net*1 b.barracudacentral.org*1}
      MAIL_POSTSCREEN_DNSBL_THRESHOLD: ${MAIL_POSTSCREEN_DNSBL_THRESHOLD:-2}
    volumes:
      - maildata:/var/mail/vhosts
      - mail-certs:/certs:ro
      - mail-state-mx2:/var/spool/postfix
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  dovecot:
    build:
      context: ./mail/dovecot
    container_name: results-mail-dovecot
    restart: unless-stopped
    depends_on:
      mail-certs-bootstrap:
        condition: service_completed_successfully
      ldap:
        condition: service_started
    ports:
      - "${MAIL_BIND_IP:-0.0.0.0}:${IMAP_PORT:-143}:143"
      - "${MAIL_BIND_IP:-0.0.0.0}:${IMAPS_PORT:-993}:993"
      - "${MAIL_BIND_IP:-0.0.0.0}:${POP3_PORT:-110}:110"
      - "${MAIL_BIND_IP:-0.0.0.0}:${POP3S_PORT:-995}:995"
      - "${MAIL_BIND_IP:-0.0.0.0}:${SIEVE_PORT:-4190}:4190"
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      MAIL_HOSTNAME: ${MAIL_HOSTNAME:-mx1.results.com.br}
      MAIL_DOMAIN: ${MAIL_DOMAIN:-results.com.br}
      MAIL_UID: ${MAIL_UID:-1004}
      MAIL_GID: ${MAIL_GID:-1004}
      MAIL_STORAGE_BASE: ${MAIL_STORAGE_BASE:-/var/mail/vhosts}
      MAIL_MYSQL_HOST: ${MAIL_MYSQL_HOST:-10.10.2.99}
      MAIL_MYSQL_PORT: ${MAIL_MYSQL_PORT:-3306}
      MAIL_MYSQL_DATABASE: ${MAIL_MYSQL_DATABASE:-results}
      MAIL_MYSQL_USER: ${MAIL_MYSQL_USER:-resultsdba}
      MAIL_MYSQL_PASSWORD: ${MAIL_MYSQL_PASSWORD:-}
      MAIL_MAILBOX_TABLE: ${MAIL_MAILBOX_TABLE:-mailbox}
      MAIL_TLS_CERT_FILE: ${MAIL_TLS_CERT_FILE:-/certs/fullchain.pem}
      MAIL_TLS_KEY_FILE: ${MAIL_TLS_KEY_FILE:-/certs/privkey.pem}
      MAIL_ENABLE_LDAP: ${MAIL_ENABLE_LDAP:-true}
      LDAP_URI: ${LDAP_URI:-ldap://srvldap0.results.intranet,ldap://srvldap1.results.intranet,ldap://srvldap2.results.intranet,ldap://srvldap3.results.intranet}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-dc=results,dc=com,dc=br}
      LDAP_BIND_DN: ${LDAP_BIND_DN:-cn=administrador,dc=results,dc=com,dc=br}
      LDAP_BIND_PASSWORD: ${LDAP_BIND_PASSWORD:-}
      LDAP_USERS_BASE_DN: ${LDAP_USERS_BASE_DN:-ou=people,dc=results,dc=com,dc=br}
    volumes:
      - maildata:/var/mail/vhosts
      - mail-certs:/certs:ro
      - dovecot-state:/var/lib/dovecot
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  rspamd:
    image: rspamd/rspamd:3.8
    container_name: results-mail-rspamd
    restart: unless-stopped
    depends_on:
      clamav:
        condition: service_started
      redis:
        condition: service_started
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
    volumes:
      - rspamd-data:/var/lib/rspamd
      - ./mail/rspamd/local.d:/etc/rspamd/local.d:ro
      - ./mail/rspamd/override.d:/etc/rspamd/override.d:ro
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  clamav:
    image: clamav/clamav:latest
    container_name: results-mail-clamav
    restart: unless-stopped
    volumes:
      - clamav-db:/var/lib/clamav
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7-alpine
    container_name: results-mail-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    tmpfs:
      - /data
    security_opt:
      - no-new-privileges:true

  ldap:
    build:
      context: ./mail/ldap
    container_name: results-mail-ldap
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      LDAP_ORGANISATION: ${LDAP_ORGANISATION:-Results Sistemas}
      LDAP_DOMAIN: ${LDAP_DOMAIN:-results.com.br}
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD:-}
      LDAP_CONFIG_PASSWORD: ${LDAP_CONFIG_PASSWORD:-${LDAP_ADMIN_PASSWORD:-}}
      LDAP_TLS: ${LDAP_TLS:-false}
    volumes:
      - ldap-data:/var/lib/ldap
      - ldap-config:/etc/ldap/slapd.d
    security_opt:
      - no-new-privileges:true

  mail-certs-bootstrap:
    image: alpine:3.20
    container_name: results-mail-certs-bootstrap
    restart: "no"
    environment:
      MAIL_HOSTNAME: ${MAIL_HOSTNAME:-mx1.results.com.br}
      MAIL_MX2_HOSTNAME: ${MAIL_MX2_HOSTNAME:-mx2.results.com.br}
      MAIL_IMAP_HOSTNAME: ${MAIL_IMAP_HOSTNAME:-imap.results.com.br}
      MAIL_ACME_DOMAINS: ${MAIL_ACME_DOMAINS:-}
      MAIL_BOOTSTRAP_CERT_DAYS: ${MAIL_BOOTSTRAP_CERT_DAYS:-7}
    command: ["/bin/sh", "/scripts/mail-certs-bootstrap.sh"]
    volumes:
      - mail-certs:/certs
      - ./scripts/mail-certs-bootstrap.sh:/scripts/mail-certs-bootstrap.sh:ro
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  mail-certbot:
    image: certbot/certbot:latest
    container_name: results-mail-certbot
    restart: unless-stopped
    depends_on:
      mail-certs-bootstrap:
        condition: service_completed_successfully
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      MAIL_HOSTNAME: ${MAIL_HOSTNAME:-mx1.results.com.br}
      MAIL_MX2_HOSTNAME: ${MAIL_MX2_HOSTNAME:-mx2.results.com.br}
      MAIL_IMAP_HOSTNAME: ${MAIL_IMAP_HOSTNAME:-imap.results.com.br}
      MAIL_ACME_DOMAINS: ${MAIL_ACME_DOMAINS:-}
      MAIL_ACME_RENEW_INTERVAL: ${MAIL_ACME_RENEW_INTERVAL:-43200}
      MAIL_ACME_SOURCE_BASE_DIR: ${MAIL_ACME_SOURCE_BASE_DIR:-/httpd-md/domains}
    entrypoint: ["/bin/sh", "/scripts/mail-certbot-entrypoint.sh"]
    volumes:
      - mail-certs:/certs
      - httpd-md-data:/httpd-md:ro
      - ./scripts/mail-certbot-entrypoint.sh:/scripts/mail-certbot-entrypoint.sh:ro
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

volumes:
  maildata:
  mail-certs:
  httpd-md-data:
    external: true
    name: ${HTTPD_MD_VOLUME:-infra-httpd_md-data}
  mail-state:
  mail-state-mx2:
  dovecot-state:
  rspamd-data:
  clamav-db:
  ldap-data:
  ldap-config: